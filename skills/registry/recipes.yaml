# Domain Recipes

recipes:
- name: schedule-interview
  title: Schedule a Job Interview
  description: USE WHEN the user needs to schedule an interview with a candidate.
  category: hiring
  services:
  - calendar
  - gmail
  steps:
  - 'Check interviewer availability: `gws calendar +agenda --days 5 --format table`'
  - 'Create the interview event: `gws calendar events insert --params ''{"calendarId": "primary"}'' --json ''{"summary": "Interview: [Candidate]", "start": {"dateTime": "..."}, "end": {"dateTime": "..."}, "attendees": [{"email": "interviewer@company.com"}, {"email": "candidate@email.com"}]}''`'
  - 'Send confirmation email: `gws gmail +send --to candidate@email.com --subject ''Interview Confirmation'' --body ''Your interview has been scheduled...''`'
  caution: Confirm the interview time with the interviewer before sending the invitation.
- name: share-job-posting
  title: Share a Job Posting with Team
  description: USE WHEN the user needs to distribute a job posting internally.
  category: hiring
  services:
  - drive
  - chat
  - gmail
  steps:
  - 'Upload the job description to Drive: `gws drive +upload job-description.pdf`'
  - 'Announce in the team Chat space: `gws workflow +file-announce --file-id FILE_ID --space spaces/SPACE_ID --message ''New opening: [Position]''`'
  - 'Email to hiring managers: `gws gmail +send --to hiring-team@company.com --subject ''New Job Posting: [Position]''`'
- name: new-hire-onboarding
  title: Set Up New Hire Onboarding
  description: USE WHEN a new employee is joining and needs onboarding materials and calendar events.
  category: onboarding
  services:
  - calendar
  - drive
  - gmail
  - admin
  steps:
  - 'Create the user account: `gws admin users insert --json ''{"primaryEmail": "newhire@company.com", "name": {"givenName": "First", "familyName": "Last"}, "password": "..."}'' --params ''{}''`'
  - 'Schedule orientation sessions: `gws calendar events insert --params ''{"calendarId": "primary"}'' --json ''{"summary": "Orientation: [New Hire]", ...}''`'
  - 'Share onboarding docs folder: `gws drive permissions create --params ''{"fileId": "FOLDER_ID"}'' --json ''{"role": "reader", "type": "user", "emailAddress": "newhire@company.com"}''`'
  - 'Send welcome email: `gws gmail +send --to newhire@company.com --subject ''Welcome aboard!''`'
  caution: Verify the new hire's email address before creating the account.
- name: onboarding-checklist
  title: Track Onboarding Progress
  description: USE WHEN you need to track onboarding task completion in a spreadsheet.
  category: onboarding
  services:
  - sheets
  steps:
  - 'Find the onboarding tracker: `gws drive files list --params ''{"q": "name contains ''\''''Onboarding Tracker''\''''"}''`'
  - 'Append a new row for the hire: `gws sheets +append --spreadsheet-id SHEET_ID --range ''Sheet1'' --values ''["New Hire Name", "Start Date", "Pending", "Pending", "Pending"]''`'
  - 'Check current status: `gws sheets values get --params ''{"spreadsheetId": "SHEET_ID", "range": "Sheet1"}''`'
- name: recurring-meeting
  title: Create a Recurring Team Meeting
  description: USE WHEN the user needs to set up a recurring meeting (standup, weekly sync, etc.).
  category: meetings
  services:
  - calendar
  steps:
  - 'Check existing schedule: `gws calendar +agenda --week --format table`'
  - 'Create recurring event: `gws calendar events insert --params ''{"calendarId": "primary"}'' --json ''{"summary": "Team Standup", "recurrence": ["RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR"], "start": {"dateTime": "...", "timeZone": "..."}, "end": {"dateTime": "...", "timeZone": "..."}}''`'
  caution: Confirm time zone and recurrence rule with the team before creating.
- name: cancel-meeting
  title: Cancel a Meeting and Notify Attendees
  description: USE WHEN a meeting needs to be cancelled with notifications to all attendees.
  category: meetings
  services:
  - calendar
  - gmail
  steps:
  - 'Find the meeting: `gws calendar +agenda --format json` and locate the event ID'
  - 'Delete the event (sends cancellation to attendees): `gws calendar events delete --params ''{"calendarId": "primary", "eventId": "EVENT_ID", "sendUpdates": "all"}''`'
  - 'Optionally send a follow-up explanation: `gws gmail +send --to attendees --subject ''Meeting Cancelled: [Title]''`'
  caution: The delete command will immediately cancel the event and notify attendees.
- name: share-document
  title: Share a Document with Specific People
  description: USE WHEN the user needs to share a Drive document with one or more people.
  category: documents
  services:
  - drive
  steps:
  - 'Find the document: `gws drive files list --params ''{"q": "name = ''\''''Document Name''\''''"}''`'
  - 'Share with a user: `gws drive permissions create --params ''{"fileId": "FILE_ID"}'' --json ''{"role": "writer", "type": "user", "emailAddress": "user@company.com"}''`'
  - 'Verify permissions: `gws drive permissions list --params ''{"fileId": "FILE_ID"}''`'
  caution: Choose the correct role (reader, writer, commenter) for the intended access level.
- name: organize-drive-folder
  title: Create and Organize a Drive Folder
  description: USE WHEN the user needs to create a folder structure in Drive.
  category: documents
  services:
  - drive
  steps:
  - 'Create the parent folder: `gws drive files create --json ''{"name": "Project Folder", "mimeType": "application/vnd.google-apps.folder"}''`'
  - 'Create a subfolder: `gws drive files create --json ''{"name": "Documents", "mimeType": "application/vnd.google-apps.folder", "parents": ["PARENT_FOLDER_ID"]}''`'
  - 'Upload files to the folder: `gws drive +upload myfile.pdf --parent FOLDER_ID`'
  - 'List contents: `gws drive files list --params ''{"q": "''\''''FOLDER_ID''\'''' in parents"}''`'
- name: email-announcement
  title: Send a Company-Wide Announcement
  description: USE WHEN the user needs to send an announcement email to a distribution list.
  category: communications
  services:
  - gmail
  steps:
  - 'Draft the announcement: `gws gmail +send --to all-company@company.com --subject ''Important Update: [Topic]'' --body ''...''`'
  caution: Company-wide emails reach everyone. Double-check recipients and content before sending.
- name: follow-up-email
  title: Send Follow-Up Emails After a Meeting
  description: USE WHEN the user needs to send follow-up notes and action items after a meeting.
  category: communications
  services:
  - gmail
  - calendar
  steps:
  - 'Get meeting details: `gws workflow +meeting-prep` or `gws calendar events get --params ''{"calendarId": "primary", "eventId": "EVENT_ID"}''`'
  - 'Send follow-up to attendees: `gws gmail +send --to attendees@company.com --subject ''Follow-up: [Meeting Title]'' --body ''Action items: ...''`'
  - 'Create tasks from action items: `gws workflow +email-to-task --message-id MSG_ID`'
- name: chat-announcement
  title: Post an Announcement to a Chat Space
  description: USE WHEN the user needs to post a message in a Google Chat space.
  category: communications
  services:
  - chat
  steps:
  - 'List available spaces: `gws chat spaces list --params ''{}''`'
  - 'Send the message: `gws chat spaces messages create --params ''{"parent": "spaces/SPACE_ID"}'' --json ''{"text": "📢 Announcement: ..."}''`'
- name: create-chat-space
  title: Create a New Chat Space for a Project
  description: USE WHEN the user needs to create a dedicated Chat space for a team or project.
  category: communications
  services:
  - chat
  steps:
  - 'Create the space: `gws chat spaces create --json ''{"displayName": "Project Alpha", "spaceType": "SPACE"}''`'
  - 'Add members: Invite team members to join the space'
  - 'Post welcome message: `gws chat spaces messages create --params ''{"parent": "spaces/SPACE_ID"}'' --json ''{"text": "Welcome to Project Alpha! 👋"}''`'
- name: weekly-status-report
  title: Generate a Weekly Status Report
  description: USE WHEN the user needs a summary of the week's activity.
  category: reporting
  services:
  - calendar
  - gmail
  - sheets
  steps:
  - 'Get the weekly digest: `gws workflow +weekly-digest --format json`'
  - 'Get today''s standup: `gws workflow +standup-report --format json`'
  - 'Optionally log to a Sheet: `gws sheets +append --spreadsheet-id SHEET_ID --range ''Reports'' --values ''["Week of ...", meetings_count, unread_count]''`'
- name: log-data-to-sheet
  title: Log Data to a Google Sheet
  description: USE WHEN the user needs to append structured data to a spreadsheet.
  category: reporting
  services:
  - sheets
  steps:
  - 'Find the spreadsheet: `gws drive files list --params ''{"q": "name = ''\''''My Tracker''\'''' and mimeType = ''\''''application/vnd.google-apps.spreadsheet''\''''"}''`'
  - 'Read existing data: `gws sheets values get --params ''{"spreadsheetId": "SHEET_ID", "range": "Sheet1"}''`'
  - 'Append new rows: `gws sheets +append --spreadsheet-id SHEET_ID --range ''Sheet1'' --values ''["timestamp", "value1", "value2"]''`'
- name: audit-drive-sharing
  title: Audit External Sharing on Drive
  description: USE WHEN the user needs to check which files are shared externally.
  category: security
  services:
  - drive
  steps:
  - 'Search for externally shared files: `gws drive files list --params ''{"q": "visibility = ''\''''anyoneWithLink''\'''' or visibility = ''\''''anyoneCanFind''\''''"}''`'
  - 'Check permissions on a specific file: `gws drive permissions list --params ''{"fileId": "FILE_ID"}''`'
  - 'Revoke external access if needed: `gws drive permissions delete --params ''{"fileId": "FILE_ID", "permissionId": "PERM_ID"}''`'
  caution: Revoking permissions immediately removes access. Confirm with the file owner first.
- name: sanitize-response
  title: Screen API Responses Through Model Armor
  description: USE WHEN the user needs to sanitize content for PII or safety before processing.
  category: security
  services:
  - modelarmor
  - gmail
  - drive
  steps:
  - 'Create a sanitize template: See `gws modelarmor +create-template --help`'
  - 'Use the template on API calls: Add `--sanitize TEMPLATE_NAME` to any gws command'
  - 'Example: `gws gmail users messages get --params ''{"userId": "me", "id": "MSG_ID"}'' --sanitize my-template`'
- name: upload-and-share
  title: Upload a File and Share It
  description: USE WHEN the user needs to upload a file to Drive and share it with someone.
  category: documents
  services:
  - drive
  steps:
  - 'Upload the file: `gws drive +upload report.pdf`'
  - Note the file ID from the upload output
  - 'Share with a user: `gws drive permissions create --params ''{"fileId": "FILE_ID"}'' --json ''{"role": "reader", "type": "user", "emailAddress": "user@company.com"}''`'
  - 'Optionally announce in Chat: `gws workflow +file-announce --file-id FILE_ID --space spaces/SPACE_ID`'
- name: bulk-download
  title: Download Multiple Drive Files
  description: USE WHEN the user needs to download multiple files from a Drive folder.
  category: documents
  services:
  - drive
  steps:
  - 'List files in the folder: `gws drive files list --params ''{"q": "''\''''FOLDER_ID''\'''' in parents"}'' --format json`'
  - 'Download each file: `gws drive files get --params ''{"fileId": "FILE_ID", "alt": "media"}'' -o filename.ext`'
  - 'For Google Docs format, use export: `gws drive files export --params ''{"fileId": "FILE_ID", "mimeType": "application/pdf"}'' -o document.pdf`'
- name: create-task-from-email
  title: Convert an Email to a Task
  description: USE WHEN the user wants to turn an email into an actionable task.
  category: productivity
  services:
  - gmail
  - workflow
  steps:
  - 'Find the email: `gws gmail +triage --max 5` to see recent messages'
  - Get the message ID from the triage output
  - 'Convert to task: `gws workflow +email-to-task --message-id MSG_ID`'
  - 'Verify the task was created: Check the output for the task ID and title'
- name: daily-standup
  title: Run a Daily Standup Report
  description: USE WHEN the user wants a quick morning briefing of today's schedule and tasks.
  category: productivity
  services:
  - workflow
  steps:
  - 'Generate standup report: `gws workflow +standup-report`'
  - 'For table format: `gws workflow +standup-report --format table`'
  - 'Share in team Chat if needed: Copy output and send via `gws chat spaces messages create`'
